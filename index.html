<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>رادار سلومي 🚨</title>
  <style>
    body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; background: #111; border: 1px solid #333; }
    .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; color: white; }
    #activateBtn { background: #007aff; }
    #alertBtn { background: #ff3b30; display: none; }
    #status { font-size: 14px; color: #aaa; margin-bottom: 20px; min-height: 40px; }
  </style>
</head>
<body>

<div class="card">
  <h1>نظام التنبيه العاجل</h1>
  <div id="status">جاري فحص حالة الربط.. 📡</div>
  <button class="btn" id="activateBtn" onclick="smartActivate()">🔔 تفعيل استقبال التنبيهات</button>
  <button class="btn" id="alertBtn" onclick="triggerGlobalAlarm()">🚨 إرسال تنبيه للجميع</button>
</div>

<script>
  const KEYS = {
    API_KEY: '4f28dee84926f7456d26408a22d82862', 
    AUTH_TOKEN: '120657',
    VAPID: 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I'
  };

  let retryCount = 0;

  async function smartActivate() {
    const status = document.getElementById('status');
    status.innerHTML = "⏳ محاولة الربط (محاولة رقم " + (retryCount + 1) + ")...";

    try {
      // طلب الإذن أولاً
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        status.innerHTML = "⚠️ لازم توافق على الإشعارات عشان يشتغل الرادار";
        return;
      }

      // تسجيل الـ Service Worker مع إضافة رقم عشوائي لمنع الكاش
      const reg = await navigator.serviceWorker.register('sw.js?v=' + Math.random());
      
      // محاولة الاشتراك
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(KEYS.VAPID)
      });

      // إرسال البيانات للسيرفر
      const response = await fetch('https://api.webpushr.com/v1/subscriber/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'webpushrKey': KEYS.API_KEY, 'webpushrAuthToken': KEYS.AUTH_TOKEN },
        body: JSON.stringify(sub)
      });

      if (response.ok) {
        status.innerHTML = "✅ تم الربط بنجاح! العداد صار 1 الآن";
        document.getElementById('activateBtn').style.display = "none";
        document.getElementById('alertBtn').style.display = "block";
      } else {
        throw new Error("السيرفر رفض الطلب");
      }

    } catch (error) {
      console.log("فشلت المحاولة:", error);
      if (retryCount < 3) {
        retryCount++;
        status.innerHTML = "🔄 فشلت المحاولة، جاري إعادة المحاولة تلقائياً...";
        setTimeout(smartActivate, 2000); // يحاول مرة ثانية بعد ثانيتين
      } else {
        status.innerHTML = "❌ تعذر الربط التلقائي. تأكد أنك أضفت الموقع للشاشة الرئيسية وحاول مجدداً.";
      }
    }
  }

  async function triggerGlobalAlarm() {
    const response = await fetch('https://api.webpushr.com/v1/notification/send/all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'webpushrKey': KEYS.API_KEY, 'webpushrAuthToken': KEYS.AUTH_TOKEN },
      body: JSON.stringify({
        title: "🚨 تنبيه من سلومي",
        message: "حالة طوارئ!",
        target_url: window.location.href + "?alarm=true"
      })
    });
    if(response.ok) document.getElementById('status').innerHTML = "✅ تم الإرسال بنجاح!";
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }
</script>
</body>
</html>
