    <style>
        body { font-family: sans-serif; background-color: #000; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .emergency-header { background: #ff0000; color: white; padding: 15px; font-weight: bold; font-size: 26px; position: fixed; top: 0; width: 100%; z-index: 100; }
        .container { padding: 30px; border: 4px solid #fff; border-radius: 10px; margin: 20px; background: #000; box-shadow: 0 0 20px #ff0000; }
        h1 { color: white; font-size: 32px; margin: 20px 0; }
        .btn-active { background: #ff0000; color: white; border: none; padding: 20px 50px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body id="mainBody">
    <div class="emergency-header">نظام الطوارئ الفعال</div>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/564/564619.png" width="120">
        <h1>تحذيرات سلومي</h1>
        <p>اضغط لتفعيل الإنذار واستلام التنبيهات</p>
        <button class="btn-active" onclick="activateDream()">تفعيل النظام الآن</button>
    </div>

    <audio id="emergencySound" src="https://www.soundjay.com/buttons/sounds/beep-11.mp3" preload="auto"></audio>

    <script>
        function activateDream() {
            // أولاً: "نخدع" الآيفون ونخليه يجهز ملف الصوت في الخلفية
            var audio = document.getElementById('emergencySound');
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(e => console.log("Audio ready"));

            // ثانياً: نطلب "السماح" من Webpushr
            webpushr('subscribe');

            // ثالثاً: نتحقق من الربط
            webpushr('fetch_id', function(sid) {
                if(sid) alert("✅ مبروك يا سلومي! الحلم تحقق والربط شغال.");
            });
        }
    </script>
</body>
</html>
