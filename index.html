<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json">
  <title>نظام الطوارئ 🚨</title>
  <script src="https://cdn.webpushr.com/app.min.js" async></script>
  <style>
    :root { --red: #ff3b30; --white: #ffffff; --card: #1c1c1e; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { width: 85%; max-width: 380px; padding: 35px 20px; border-radius: 30px; background: var(--card); border: 1px solid #333; }
    h1 { color: var(--red); font-size: 24px; margin-bottom: 10px; }
    #status { color: #8e8e93; font-size: 14px; margin-bottom: 25px; }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    #activateBtn { background: var(--white); color: #000; }
    #activateBtn:active { background: #e0e0e0; transform: scale(0.98); }
  </style>
</head>
<body>

<div class="card">
  <h1>نظام الطوارئ 🚨</h1>
  <p id="status">جاري فحص حالة السيرفر... 📡</p>
  <button class="btn" id="activateBtn" onclick="webpushr('showPrompt')">🔔 تشغيل الإشعارات</button>
</div>

<script>
  // توجيه إجباري للمتصفح عشان يلقى الملف الثالث في مجلد alert
  var _webpushr_sw = '/alert/webpushr-sw.js'; 

  window.webpushr = window.webpushr || function(){(window.webpushr.q = window.webpushr.q || []).push(arguments)};
  webpushr('setup',{'key':'4f28dee84926f7456d26408a22d82862'});

  setInterval(() => {
    if(localStorage.getItem('_webpushr_p') === 'granted'){
      document.getElementById('status').innerText = "✅ النظام متصل والعداد شغال";
      document.getElementById('activateBtn').innerText = "تم التفعيل بنجاح ✅";
      document.getElementById('activateBtn').style.background = "#2c2c2e";
      document.getElementById('activateBtn').style.color = "#8e8e93";
      document.getElementById('activateBtn').onclick = null;
    }
  }, 1000);
</script>
</body>
</html>
