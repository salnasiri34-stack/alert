<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>نظام الطوارئ | العرّاب</title>
  
  <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
  <script>
    window.OneSignal = window.OneSignal || [];
    OneSignal.push(function() {
      OneSignal.init({
        appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
        safari_web_id: "web.onesignal.auto.102660d1-030b-4680-8646-7787498c394c",
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true,
      });
    });

    // الزر اللي يفتح السماح فوراً
    function subscribeUser() {
      OneSignal.push(function() {
        OneSignal.showNativePrompt();
      });
    }
  </script>

  <style>
    body { 
      font-family: -apple-system, system-ui, sans-serif; 
      background: #000; 
      color: #fff; 
      text-align: center; 
      margin: 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      overflow: hidden;
    }
    .card { 
      width: 90%; 
      max-width: 400px; 
      padding: 35px; 
      border-radius: 30px; 
      background: #111; 
      border: 1px solid #333; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
    }
    #mainLogo { 
      font-size: 80px; 
      cursor: pointer; 
      user-select: none; 
      transition: transform 0.2s;
    }
    #mainLogo:active { transform: scale(0.9); }
    .status-box { 
      background: #1a1a1a; 
      padding: 15px; 
      border-radius: 15px; 
      margin: 20px 0; 
      border: 1px solid #222; 
    }
    #countValue { color: #34c759; font-weight: 900; font-size: 22px; }
    .btn { 
      width: 100%; 
      padding: 20px; 
      border-radius: 15px; 
      font-size: 18px; 
      font-weight: bold; 
      cursor: pointer; 
      border: none; 
      transition: 0.3s; 
      margin-top: 10px; 
    }
    #activateBtn { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
    #adminPanel { 
      display: none; 
      margin-top: 20px; 
      border-top: 1px dashed #444; 
      padding-top: 20px; 
    }
    .admin-input { 
      width: 100%; 
      padding: 15px; 
      margin-bottom: 12px; 
      border-radius: 12px; 
      background: #000; 
      color: #fff; 
      border: 1px solid #333; 
      box-sizing: border-box; 
      font-size: 16px; 
    }
    #sendBtn { background: #ff3b30; color: #fff; }
  </style>
</head>
<body>

<div class="card">
  <div id="mainLogo">🚨</div>
  <h1 style="margin: 10px 0;">مركز الإنذار</h1>
  <div style="color: #ff3b30; font-weight: bold;">النظام الفيدرالي للسيد سلومي</div>
  
  <div class="status-box">
    <span>حالة النظام: <b id="countValue">بانتظار الإشارة..</b></span>
  </div>

  <button class="btn" id="activateBtn" onclick="subscribeUser()">🔔 تفعيل استقبال التنبيهات</button>

  <div id="adminPanel">
    <h3 style="color: #007aff; margin-bottom: 15px;">غرفة القيادة</h3>
    <input type="text" id="alertTitle" class="admin-input" placeholder="عنوان التنبيه...">
    <textarea id="alertBody" class="admin-input" rows="3" placeholder="محتوى الرسالة..."></textarea>
    <button id="sendBtn" class="btn" onclick="sendGlobalPush()">بث الإشارة النووية 🚀</button>
  </div>
</div>

<script>
  // تحديث الحالة التلقائي
  setInterval(() => {
    OneSignal.push(function() {
      OneSignal.getNotificationPermission(function(permission) {
        if (permission === 'granted') {
          document.getElementById('countValue').innerText = "متصل بنجاح ✅";
          document.getElementById('activateBtn').style.display = "none";
        }
      });
    });
  }, 2000);

  // كود الإرسال المصحح لحل مشكلة السيرفر
  async function sendGlobalPush() {
    const title = document.getElementById('alertTitle').value || "إنذار عاجل";
    const message = document.getElementById('alertBody').value || "حالة طوارئ من نظام سلومي";
    const btn = document.getElementById('sendBtn');
    
    btn.innerText = "جاري البث... 📡";
    btn.disabled = true;

    try {
      const response = await fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          "Authorization": "Basic os_v2_app_f3iq3hzjczfddet3niv6u4de3lcuzpyuysuuxz4i56gbnugat4cakvbjm5wuc4zbmjjbibsfzxr24xqabovt57hw7gmqkbbihlondia"
        },
        body: JSON.stringify({
          app_id: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          included_segments: ["Total Subscriptions"],
          headings: {"en": title},
          contents: {"en": message},
          isIos: true
        })
      });

      if (response.ok) {
        alert("تم البث بنجاح يا وحش! 🚨🔥");
      } else {
        const errorData = await response.json();
        alert("مشكلة في السيرفر: " + (errorData.errors ? errorData.errors[0] : "تأكد من الـ API Key"));
      }
    } catch (e) {
      alert("مشكلة اتصال! تأكد أنك تستخدم تطبيق الشاشة الرئيسية.");
    }
    
    btn.innerText = "بث الإشارة النووية 🚀";
    btn.disabled = false;
  }

  // الدخول السري (5 ضغطات)
  let taps = 0;
  document.getElementById('mainLogo').onclick = () => {
    taps++;
    if(taps >= 5) {
      if(prompt("كلمة السر:") === "1313") {
        document.getElementById('adminPanel').style.display = "block";
        document.getElementById('activateBtn').style.display = "none";
      }
      taps = 0;
    }
  };
</script>
</body>
</html>
