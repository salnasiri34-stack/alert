<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>نظام التنبيه العاجل 🚨</title>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.page.js" defer></script>
  <script>
    window.OneSignal = window.OneSignal || [];
    OneSignal.push(function() {
      OneSignal.init({
        appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da", // الـ App ID حقك
        notifyButton: { enable: false },
      });
    });
  </script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .card { width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; background: #111; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
    h1 { color: #ffffff; font-size: 24px; margin-bottom: 5px; }
    .subtitle { color: #ff3b30; font-size: 14px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; cursor: pointer; }
    .status-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 14px; color: #aaa; border: 1px solid #222; min-height: 20px; }
    .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
    #activateBtn { background: #007aff; }
    #adminPanel { display: none; }
    #sendBtn { background: #ff3b30; }
    .alarm-active { animation: pulse-red 0.5s infinite; }
    @keyframes pulse-red { 0% { background: #0a0a0a; } 50% { background: #3d0000; } 100% { background: #0a0a0a; } }
  </style>
</head>
<body id="bg">

<div class="card">
  <h1 onclick="checkAdmin()">نظام التنبيه العاجل</h1>
  <div class="subtitle" id="logo">لوحة تحكم سلومي</div>
  <div class="status-box" id="status">جاهز للعمل.. ✅</div>
  
  <button class="btn" id="activateBtn" onclick="startSystem()">🔔 تفعيل استقبال التنبيهات</button>

  <div id="adminPanel">
    <div style="margin-bottom: 10px; color: #34c759;">نظام البث نشط 📡</div>
    <button class="btn" id="sendBtn" onclick="triggerGlobalAlarm()">🚨 إرسال تنبيه للجميع</button>
  </div>
</div>

<script>
  const status = document.getElementById('status');

  // وظيفة تفعيل النظام وطلب الإذن
  async function startSystem() {
    status.innerHTML = "⏳ جاري طلب الإذن...";
    OneSignal.push(function() {
      OneSignal.Notifications.requestPermission().then(function(permission) {
        if (permission === 'granted') {
          status.innerHTML = "✅ النظام متصل وجاهز";
          document.getElementById('activateBtn').style.display = "none";
        } else {
          status.innerHTML = "❌ تم رفض الإذن";
        }
      });
    });
  }

  // تحديث الحالة تلقائياً
  setInterval(() => {
    OneSignal.push(function() {
      if (OneSignal.Notifications.permission) {
        status.innerHTML = "✅ النظام متصل وجاهز";
        document.getElementById('activateBtn').style.display = "none";
      }
    });
  }, 2000);

  // وظيفة البث النووي باستخدام كودك السري
  async function triggerGlobalAlarm() {
    status.innerHTML = "📡 جاري بث الإشارة...";
    try {
      const response = await fetch('https://onesignal.com/api/v1/notifications', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json; charset=utf-8', 
          'Authorization': 'Basic os_v2_app_f3iq3hzjczfddet3niv6u4de3lcuzpyuysuuxz4i56gbnugat4cakvbjm5wuc4zbmjjbibsfzxr24xqabovt57hw7gmqkbbihlondia' 
        },
        body: JSON.stringify({
          app_id: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          included_segments: ["Total Subscriptions"],
          headings: {"en": "🚨 تنبيه عاجل من سلومي"},
          contents: {"en": "حالة طوارئ قصوى، الجميع ينتبه!"},
          ios_badgeType: "Increase",
          ios_badgeCount: 1
        })
      });

      if(response.ok) {
        status.innerHTML = "✅ تم الإرسال بنجاح!";
        setTimeout(() => { status.innerHTML = "✅ النظام متصل وجاهز"; }, 3000);
      } else {
        status.innerHTML = "❌ خطأ في البث";
      }
    } catch (e) {
      status.innerHTML = "❌ فشل الاتصال";
    }
  }

  // نظام الدخول السري (اضغط على "لوحة تحكم سلومي" 5 مرات)
  let taps = 0;
  document.getElementById('logo').onclick = () => {
    taps++;
    if (taps >= 5) {
      const pw = prompt("أدخل كلمة سر العرّاب:");
      if (pw === "1313") {
        document.getElementById('adminPanel').style.display = "block";
        status.innerHTML = "👑 مرحباً بك يا قائد";
      }
      taps = 0;
    }
  };
</script>
</body>
</html>
