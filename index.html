<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإنذار الرسمي</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          safari_web_id: "web.onesignal.auto.064f7b60-c650-4841-8608-202958428587",
          notifyButton: { 
            enable: true,
            position: 'bottom-right'
          }
        });
      });
    </script>

    <style>
        body {
            margin: 0; background-color: #000; color: white;
            font-family: 'Arial', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .warning-icon {
            font-size: 80px; color: #ffcc00;
            animation: blink 0.4s infinite; display: none;
            margin: 20px 0;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .emergency-box { 
            text-align: center; display: none; 
            border: 4px solid #ffcc00; padding: 25px; 
            border-radius: 20px; width: 85%; max-width: 400px;
        }
        button { 
            background: #ffcc00; color: black; border: none; 
            padding: 25px; font-size: 22px; font-weight: bold; 
            border-radius: 15px; cursor: pointer; width: 100%;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }
    </style>
</head>
<body>

    <div id="startScreen" style="width: 90%; text-align: center;">
        <button onclick="startEmergency()">⚠️ اضغط لفتح البلاغ العاجل ⚠️</button>
    </div>

    <div id="emergencyContent" class="emergency-box">
        <div class="warning-icon">⚠️</div>
        <h1 style="color: #ffcc00; font-size: 30px;">تحذير: طوارئ عاجلة</h1>
        <p id="msgText" style="font-size: 20px; line-height: 1.6;">جاري معالجة البيانات الأمنية...</p>
        <div class="warning-icon">⚠️</div>
    </div>

    <audio id="emergencySound" loop>
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startEmergency() {
            // 1. إظهار العناصر المخفية
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('emergencyContent').style.display = 'block';
            document.querySelectorAll('.warning-icon').forEach(el => el.style.display = 'block');
            
            // 2. تشغيل الصوت فوراً
            var audio = document.getElementById('emergencySound');
            audio.play();

            // 3. تفعيل الاهتزاز القوي (للأجهزة الداعمة)
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 800, 200, 1000]);
            }

            // 4. تغيير النص بعد 3 ثواني لزيادة الحماس
            setTimeout(() => {
                document.getElementById('msgText').innerHTML = "تم رصد دخول غير مصرح به!<br>الرجاء البقاء في مكانك.";
                if (navigator.vibrate) navigator.vibrate([1000, 500, 2000]);
            }, 3000);
        }
    </script>
</body>
</html>
