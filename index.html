<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>نظام إنذار العرّاب 🚨</title>
    
    <script src="https://cdn.webpushr.com/app.min.js" async></script>

    <style>
        :root { --danger: #ff3b30; --green: #34c759; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .main-panel { width: 88%; max-width: 420px; padding: 50px 25px; background: var(--card); border-radius: 40px; border: 2px solid #222; text-align: center; box-shadow: 0 0 60px rgba(255, 59, 48, 0.25); position: relative; }
        .logo { font-size: 85px; margin-bottom: 25px; cursor: pointer; user-select: none; filter: drop-shadow(0 0 10px rgba(255,59,48,0.5)); }
        
        h1 { font-size: 30px; color: var(--danger); margin: 0 0 10px; font-weight: 900; letter-spacing: -1px; }
        .status-badge { background: #1c1c1e; padding: 14px 24px; border-radius: 50px; font-size: 15px; color: #888; border: 1px solid #333; margin-bottom: 35px; display: inline-block; }
        #countValue { color: var(--green); font-weight: 900; font-size: 20px; }

        .btn { background: #fff; color: #000; padding: 22px; border-radius: 24px; font-size: 20px; font-weight: 900; border: none; width: 100%; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn:active { transform: scale(0.92); background: var(--danger); color: #fff; }
        
        /* تأثير النبض النووي */
        .pulse { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 40px; border: 2px solid var(--danger); animation: pulse-red 2s infinite; pointer-events: none; opacity: 0; }
        @keyframes pulse-red { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.1); opacity: 0; } }
    </style>
</head>
<body>

<div class="main-panel">
    <div class="pulse" id="pulseEffect" style="display:none"></div>
    <div class="logo" id="alarmLogo">🚨</div>
    <h1>مركز الإنذار الدولي</h1>
    <div class="status-badge">الأجهزة النشطة بالرادار: <span id="countValue">0</span></div>
    
    <button class="btn" id="mainBtn" onclick="webpushr('showPrompt')">تفعيل نظام التنبيه ⚡</button>
</div>

<script>
    // مفاتيح العرّاب المعتمدة (REST API + Public Key)
    const MY_KEY = '4f28dee84926f7456d26408a22d82862';
    const PUBLIC_VAPID = 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I';

    // إنهاء مشكلة الـ 404 للأبد (تحديد المسار الديناميكي لملف الـ SW)
    var path = window.location.pathname;
    var _webpushr_sw = path.substring(0, path.lastIndexOf('/')) + '/webpushr-sw.js';

    window.webpushr = window.webpushr || function(){(window.webpushr.q = window.webpushr.q || []).push(arguments)};
    
    // تشغيل المحرك الرسمي
    webpushr('setup', {
        'key': MY_KEY,
        'publicKey': PUBLIC_VAPID 
    });

    // سحر العداد: مراقبة لحظية للحالة
    setInterval(() => {
        if(localStorage.getItem('_webpushr_p') === 'granted'){
            document.getElementById('countValue').innerText = "1 جهاز";
            document.getElementById('mainBtn').innerText = "نظام الربط نشط ✅";
            document.getElementById('mainBtn').style.opacity = "0.4";
            document.getElementById('mainBtn').style.pointerEvents = "none";
            document.getElementById('pulseEffect').style.display = "block";
            document.getElementById('countValue').style.textShadow = "0 0 10px #34c759";
        }
    }, 1000);

    // كلمة سر العرّاب لفتح قنوات الإرسال (5 ضغطات على 🚨)
    let tapCount = 0;
    document.getElementById('alarmLogo').onclick = () => {
        tapCount++;
        if(tapCount >= 5) {
            if(prompt("رمز دخول العرّاب سلومي:") === "1313") {
                alert("تم فتح بروتوكول الإرسال الفيدرالي باستخدام التوكن 120657 🫡");
            }
            tapCount = 0;
        }
    };
</script>
</body>
</html>
