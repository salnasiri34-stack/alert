    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0b0b; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .container { padding: 30px; border: 2px solid #ffcc00; border-radius: 20px; margin: 20px; box-shadow: 0 0 25px rgba(255, 204, 0, 0.2); background: rgba(255, 255, 255, 0.05); }
        h1 { color: #ffcc00; font-size: 28px; margin-bottom: 10px; }
        p { font-size: 18px; color: #ddd; line-height: 1.6; }
        .btn-active { background: linear-gradient(45deg, #ffcc00, #ff9900); color: black; border: none; padding: 20px 40px; font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3); transition: 0.3s; }
        .btn-active:active { transform: scale(0.95); }

<body>
    <div class="container">
        <div style="font-size: 60px; margin-bottom: 20px;">⚠️</div>
        <h1>نظام تحذيرات سلومي</h1>
        <p>يرجى تفعيل التنبيهات لتصلك رسائل الطوارئ، الأمطار، والتحذيرات الهامة فور صدورها.</p>
        <button class="btn-active" onclick="activateSystem()">تفعيل النظام الآن</button>
        <div id="status" class="footer-text">حالة النظام: بانتظار الاتصال...</div>
    </div>

    <script>
        function activateSystem() {
            // كود Webpushr يطلب الإذن تلقائياً عند استدعاء الموقع
            // لكن هنا نؤكد الحالة للمستخدم
            if (Notification.permission === "granted") {
                document.getElementById('status').innerText = "✅ النظام يعمل: أنت الآن ضمن شبكة العراب";
                document.getElementById('status').style.color = "#00ff00";
            } else {
                alert("اضغط 'سماح' (Allow) عندما يظهر لك طلب المتصفح لتفعيل الإشعارات.");
            }
        }
    </script>
