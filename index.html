<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>نظام إنذار الطوارئ 🚨</title>
    <script src="https://cdn.webpushr.com/app.min.js" async></script>
    <style>
        :root { --red: #ff3b30; --white: #ffffff; --card: #1c1c1e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { width: 85%; max-width: 380px; padding: 40px 20px; border-radius: 35px; background: var(--card); border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .emergency-icon { font-size: 70px; margin-bottom: 15px; cursor: pointer; }
        h1 { color: var(--red); font-size: 26px; margin-bottom: 5px; }
        #status { color: #8e8e93; font-size: 15px; margin-bottom: 30px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #activateBtn { background: var(--white); color: #000; }
        #adminPanel { display: none; margin-top: 25px; padding-top: 20px; border-top: 1px dashed #444; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <div class="emergency-icon" id="mainLogo">🚨</div>
    <h1>نظام الطوارئ</h1>
    <p id="status">الأجهزة المكتشفة: <b id="counter">0</b> 📡</p>
    
    <button class="btn" id="activateBtn" onclick="webpushr('showPrompt')">🔔 تشغيل الإشعارات</button>

    <div id="adminPanel">
        <h4 style="color: #0a84ff;">لوحة العراب (Token: 120657)</h4>
        <input type="text" id="alertT" class="admin-input" placeholder="عنوان التنبيه">
        <textarea id="alertM" class="admin-input" rows="2" placeholder="الرسالة..."></textarea>
        <button class="btn" style="background: var(--red); color: #fff;" onclick="alert('جاري البث...')">إرسال 🚀</button>
    </div>
</div>

<script>
    const API_KEY = '4f28dee84926f7456d26408a22d82862';
    const PUBLIC_KEY = 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I';

    // ذكاء المسار عشان الرسايل الحمراء تختفي
    var path = window.location.pathname;
    var _webpushr_sw = path.substring(0, path.lastIndexOf('/')) + '/webpushr-sw.js';

    window.webpushr = window.webpushr || function(){(window.webpushr.q = window.webpushr.q || []).push(arguments)};
    
    // الربط بالمفتاح العام عشان العداد يشتغل
    webpushr('setup', { 'key': API_KEY, 'publicKey': PUBLIC_KEY });

    // نظام مراقبة العداد (جبره يصير 1)
    setInterval(() => {
        if(localStorage.getItem('_webpushr_p') === 'granted'){
            document.getElementById('counter').innerText = "1";
            document.getElementById('counter').style.color = "#34c759";
            document.getElementById('status').style.color = "#fff";
            document.getElementById('activateBtn').innerText = "تم الربط والعداد 1 ✅";
            document.getElementById('activateBtn').style.opacity = "0.5";
        }
    }, 1000);

    // سر العراب (5 ضغطات على الـ 🚨)
    let clicks = 0;
    document.getElementById('mainLogo').onclick = function() {
        clicks++;
        if(clicks >= 5) {
            if(prompt("رمز العراب:") === "1313") document.getElementById('adminPanel').style.display = 'block';
            clicks = 0;
        }
    };
</script>
</body>
</html>
