<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع سلومي - التنبيهات</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <script>
      // إعدادات OneSignal الصحيحة للنسخة الجديدة
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          safari_web_id: "web.onesignal.auto.064f7b60-c650-4841-8608-202958428587",
          notifyButton: {
            enable: true, /* تفعيل زر الجرس */
            size: 'large',
            position: 'bottom-right',
            colors: {
              'circle.background': '#007bff',
              'circle.foreground': 'white',
              'badge.background': '#007bff',
              'badge.foreground': 'white',
              'badge.bordercolor': 'white',
              'pulse.color': 'white',
              'dialog.button.background.hover': '#0069d9',
              'dialog.button.background.active': '#0069d9',
              'dialog.button.background': '#007bff',
              'dialog.button.foreground': 'white'
            },
            text: {
              'tip.state.unsubscribed': 'الاشتراك في التنبيهات',
              'tip.state.subscribed': 'تم الاشتراك بنجاح',
              'tip.state.blocked': 'أنت مانع التنبيهات',
              'message.prenotify': 'اضغط هنا للاشتراك في التنبيهات',
              'message.action.subscribed': 'شكراً لك!',
              'message.action.resubscribed': 'تم التفعيل مجدداً',
              'message.action.unsubscribed': 'تم إلغاء الاشتراك',
              'dialog.main.title': 'إعدادات التنبيهات',
              'dialog.main.button.subscribe': 'اشتراك',
              'dialog.main.button.unsubscribe': 'إلغاء'
            }
          },
          // إظهار نافذة الاشتراك تلقائياً
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true,
              timeDelay: 3,
              pageViews: 1
            }
          }
        });
      });

      // دالة طلب الإذن الجديدة (عشان الزر يشتغل بدون أخطاء)
      async function requestNotify() {
        OneSignalDeferred.push(async function(OneSignal) {
          try {
            await OneSignal.Notifications.requestPermission();
          } catch (e) {
            console.log("الاشتراك مفعل مسبقاً أو تم منعه من المتصفح");
          }
        });
      }
    </script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #2c3e50, #000000);
            color: white; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center; max-width: 400px;
        }
        h1 { margin-bottom: 20px; font-size: 2.5rem; }
        p { margin-bottom: 30px; opacity: 0.8; }
        .btn {
            background: #007bff; color: white; border: none;
            padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; cursor: pointer; font-weight: bold;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,123,255,0.4);
        }
        .btn:hover { background: #0056b3; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>موقع سلومي 🚀</h1>
        <p>جرب تضغط الزر تحت.. إذا ما طلع خطأ أحمر في الكونسول، يعني شغلنا 100%!</p>
        <button class="btn" onclick="requestNotify()">تفعيل التنبيهات</button>
    </div>

</body>
</html>
