<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التنبيهات العائلية</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          safari_web_id: "web.onesignal.auto.064f7b60-c650-4841-8608-202958428587",
          notifyButton: { enable: false }
        });

        OneSignal.Notifications.addEventListener("click", function(event) {
            const msgBody = event.notification.body;
            const now = new Date();
            const timeString = now.toLocaleDateString('ar-SA') + " | " + now.toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'});
            
            localStorage.setItem('lastAlertMsg', msgBody);
            localStorage.setItem('lastAlertTime', timeString);
            
            showEmergencyUI(msgBody, timeString);
        });
      });

      function subscribeUser() {
        OneSignal.Notifications.requestPermission();
      }

      function checkLastAlert() {
        const savedMsg = localStorage.getItem('lastAlertMsg');
        const savedTime = localStorage.getItem('lastAlertTime');
        if (savedMsg) {
            showEmergencyUI(savedMsg, savedTime);
        } else {
            alert('لا توجد بلاغات مسجلة حالياً.');
        }
      }
    </script>

    <style>
        body { margin: 0; background: #f4f7f9; color: #333; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 25px; width: 85%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid #007bff; }
        .btn-subscribe { background: #007bff; color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 20px; }
        .btn-alert { background: #dc3545; color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 20px; cursor: pointer; }
        .emergency-icon { font-size: 60px; color: #dc3545; animation: blink 0.6s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .time-badge { background: #f8f9fa; color: #666; padding: 5px 15px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="card" id="mainUI">
        <h2>مركز التنبيهات العائلية</h2>
        <div style="background: #e7f3ff; color: #007bff; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 20px;">حالة النظام: متصل</div>
        <button class="btn-subscribe" onclick="subscribeUser()">🔔 تفعيل جرس الإنذار (سماح)</button>
        <p style="color: #666; font-size: 14px;">اضغط سماح لتلقي بلاغات الطوارئ فور صدورها.</p>
        <hr style="border: 0.5px solid #eee; margin: 25px 0;">
        <button class="btn-alert" onclick="checkLastAlert()">📢 عرض آخر بلاغ مستلم</button>
    </div>

    <div class="card" id="alertUI" style="display:none; border-top: 8px solid #dc3545;">
        <div class="emergency-icon">⚠️</div>
        <h2 style="color: #dc3545;">تنبيه عاجل</h2>
        <div id="timeDisplay" class="time-badge">تاريخ البلاغ: --</div>
        <p id="dynamicMsg" style="font-size: 22px; font-weight: bold; color: #000; min-height: 50px;"></p>
        <hr style="border: 0.5px solid #eee;">
        <button onclick="stopAndReload()" style="background:#6c757d; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; width: 100%; font-weight: bold;">إيقاف الإنذار والعودة</button>
    </div>

    <audio id="alarmSound" loop preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/emergency_it_is_emergency.ogg" type="audio/ogg">
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        function showEmergencyUI(message, time) {
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('alertUI').style.display = 'block';
            
            document.getElementById('dynamicMsg').innerText = message;
            document.getElementById('timeDisplay').innerText = "تاريخ البلاغ: " + time;
            
            const audio = document.getElementById('alarmSound');
            audio.volume = 1.0; // أعلى مستوى صوت
            audio.play().catch(e => console.log("تحتاج تفاعل"));
            
            if (navigator.vibrate) {
                // اهتزاز طويل وقوي
                navigator.vibrate([500, 200, 500, 200, 500, 200, 1000]);
            }
        }

        function stopAndReload() {
            const audio = document.getElementById('alarmSound');
            audio.pause();
            audio.currentTime = 0;
            location.reload();
        }
    </script>
</body>
</html>
