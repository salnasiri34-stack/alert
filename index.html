<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json">
  <title>نظام الطوارئ 🚨</title>
  
  <script src="https://cdn.webpushr.com/app.min.js" async></script>

  <style>
    :root { --red: #ff3b30; --white: #ffffff; --card: #1c1c1e; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
    .card { width: 85%; max-width: 380px; padding: 40px 20px; border-radius: 35px; background: var(--card); border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
    h1 { color: var(--red); font-size: 26px; margin-bottom: 10px; }
    #status { color: #8e8e93; font-size: 15px; margin-bottom: 30px; }
    .btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
    #activateBtn { background: var(--white); color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
    #activateBtn:active { transform: scale(0.96); background: #e0e0e0; }
  </style>
</head>
<body>

<div class="card">
  <h1>نظام الطوارئ 🚨</h1>
  <p id="status">جاري فحص حالة الاتصال... 📡</p>
  <button class="btn" id="activateBtn" onclick="webpushr('showPrompt')">🔔 تشغيل الإشعارات</button>
</div>

<script>
  // الحل السحري للرسايل الحمراء: توجيه المتصفح للملف في مجلد alert
  var _webpushr_sw = '/alert/webpushr-sw.js'; 

  window.webpushr = window.webpushr || function(){(window.webpushr.q = window.webpushr.q || []).push(arguments)};
  webpushr('setup',{'key':'4f28dee84926f7456d26408a22d82862'});

  // مراقبة حالة الاشتراك لتحديث العداد
  setInterval(() => {
    if(localStorage.getItem('_webpushr_p') === 'granted'){
      document.getElementById('status').innerText = "✅ النظام متصل والعداد يحسبك";
      document.getElementById('activateBtn').innerText = "تم التفعيل بنجاح";
      document.getElementById('activateBtn').style.background = "#2c2c2e";
      document.getElementById('activateBtn').style.color = "#8e8e93";
      document.getElementById('activateBtn').onclick = null;
    }
  }, 1000);
</script>
</body>
</html>
