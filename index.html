<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التنبيهات العائلية</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          safari_web_id: "web.onesignal.auto.064f7b60-c650-4841-8608-202958428587",
          notifyButton: { enable: false }
        });

        // هذا الجزء هو "المخ": يسحب الرسالة اللي أنت أرسلتها من الموقع
        OneSignal.Notifications.addEventListener("click", function(event) {
            const notificationTitle = event.notification.title;
            const notificationBody = event.notification.body;
            
            // تشغيل واجهة الإنذار فوراً وعرض النص اللي أنت كتبته
            showEmergencyUI(notificationBody);
        });
      });

      function subscribeUser() {
        OneSignal.Notifications.requestPermission();
      }
    </script>

    <style>
        body { margin: 0; background: #f4f7f9; color: #333; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .card { background: white; padding: 35px; border-radius: 25px; width: 85%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid #007bff; }
        .btn-subscribe { background: #007bff; color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .btn-alert { background: #dc3545; color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 20px; cursor: pointer; }
        .emergency-icon { font-size: 60px; color: #dc3545; animation: blink 0.6s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="card" id="mainUI">
        <h2>مركز التنبيهات العائلية</h2>
        <button class="btn-subscribe" onclick="subscribeUser()">🔔 تفعيل جرس الإنذار (سماح)</button>
        <p style="color: #666; font-size: 14px;">اضغط سماح لتلقي بلاغات الأمطار والطوارئ.</p>
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        <button class="btn-alert" onclick="alert('بانتظار وصول بلاغ جديد من المسؤول...')">📢 بانتظار البلاغات</button>
    </div>

    <div class="card" id="alertUI" style="display:none; border-top: 8px solid #dc3545;">
        <div class="emergency-icon">⚠️</div>
        <h2 style="color: #dc3545;">بـلاغ عاجل</h2>
        <p id="dynamicMsg" style="font-size: 22px; font-weight: bold; color: #000;"></p>
        <hr>
        <button onclick="location.reload()" style="background:#6c757d; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">إغلاق التنبيه</button>
    </div>

    <audio id="alarmSound" loop><source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg"></audio>

    <script>
        function showEmergencyUI(message) {
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('alertUI').style.display = 'block';
            
            // وضع الرسالة اللي أنت كتبتها في OneSignal هنا
            document.getElementById('dynamicMsg').innerText = message;
            
            const audio = document.getElementById('alarmSound');
            audio.play();
            
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 800]);
            }
        }
    </script>
</body>
</html>
