<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json">
  <title>إنذار الطوارئ 🚨</title>
  <script src="https://cdn.webpushr.com/app.min.js" async></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .admin-trigger { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; background: #ff3b30; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; z-index: 100; font-size: 20px; }
    .card { width: 85%; max-width: 380px; padding: 30px 20px; border-radius: 30px; background: #1c1c1e; border: 1px solid #333; position: relative; }
    h1 { color: #ff3b30; font-size: 24px; }
    #status { color: #8e8e93; font-size: 14px; margin-bottom: 20px; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    #activateBtn { background: #007aff; color: white; }
    #adminPanel { display: none; background: #2c2c2e; padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid #ff9500; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #1c1c1e; color: #fff; box-sizing: border-box; font-family: inherit; }
    #sendBtn { background: #ff9500; color: #000; }
  </style>
</head>
<body>

<div class="admin-trigger" onclick="checkAdmin()">⚙️</div>

<div class="card">
  <h1>نظام إنذار الطوارئ 🚨</h1>
  <p id="status">جاري فحص حالة النظام... 📡</p>
  <button class="btn" id="activateBtn" onclick="webpushr('showPrompt')">🔔 تفعيل الإشعارات</button>

  <div id="adminPanel">
    <h3 style="color:#ff9500; margin-top:0;">لوحة تحكم العراب 👑</h3>
    <input type="text" id="adminName" placeholder="اسمك (مثلاً: سلومي)">
    <input type="text" id="alertType" placeholder="نوع الإنذار (مثلاً: مطر غزير)">
    <textarea id="alertDesc" rows="2" placeholder="وصف سريع للرسالة..."></textarea>
    <button class="btn" id="sendBtn" onclick="sendCustomAlert()">🚀 إرسال للجميع</button>
  </div>
</div>

<script>
  window.webpushr = window.webpushr || function(){(window.webpushr.q = window.webpushr.q || []).push(arguments)};
  webpushr('setup',{'key':'4f28dee84926f7456d26408a22d82862'});

  function checkAdmin() {
    let password = prompt("أدخل رمز الدخول السري:");
    if (password === "1313") {
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('activateBtn').style.display = 'none';
      document.getElementById('status').innerText = "وضع الإرسال (الآدمن)";
    } else {
      alert("الرمز خطأ!");
    }
  }

  // تحديث الحالة إذا كان مشترك أصلاً
  setInterval(function(){
      if(localStorage.getItem('_webpushr_p') === 'granted' && document.getElementById('adminPanel').style.display !== 'block'){
          document.getElementById('status').innerText = "✅ النظام متصل واستقبال الإشعارات مفعل";
          document.getElementById('activateBtn').innerText = "مفعل ✅";
          document.getElementById('activateBtn').disabled = true;
          document.getElementById('activateBtn').style.background = "#2c2c2e";
      }
  }, 1000);

  async function sendCustomAlert() {
    const name = document.getElementById('adminName').value || "سلومي";
    const type = document.getElementById('alertType').value || "طوارئ";
    const desc = document.getElementById('alertDesc').value || "الرجاء الانتباه والضغط للتفاصيل";
    
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.innerText = "⏳ جاري الإرسال...";
    sendBtn.disabled = true;

    try {
      await fetch('https://api.webpushr.com/v1/notification/send/all', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'webpushrKey': '4f28dee84926f7456d26408a22d82862', 
          'webpushrAuthToken': '120657' 
        },
        body: JSON.stringify({
          title: "⚠️ إنذار: " + type,
          message: "من: " + name + " | " + desc,
          target_url: window.location.href,
          icon: "https://img.icons8.com/color/96/warning-shield.png"
        })
      });
      alert("✅ تم إرسال الإنذار بنجاح!");
    } catch (e) {
      alert("❌ حدث خطأ في الإرسال");
    } finally {
      sendBtn.innerText = "🚀 إرسال للجميع";
      sendBtn.disabled = false;
    }
  }
</script>
</body>
</html>
