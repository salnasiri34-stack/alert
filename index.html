<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>نظام التنبيه العاجل 🚨</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/96/alert-light.png" />

  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .card { width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; background: #111; border: 1px solid #333; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
    h1 { color: #ffffff; font-size: 24px; margin-bottom: 5px; }
    .subtitle { color: #ff3b30; font-size: 14px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
    .status-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 14px; color: #aaa; border: 1px solid #222; min-height: 20px; }
    .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
    #activateBtn { background: #007aff; }
    #alertBtn { background: #ff3b30; display: none; }
    .alarm-active { animation: pulse-red 0.5s infinite; }
    @keyframes pulse-red { 0% { background: #0a0a0a; } 50% { background: #3d0000; } 100% { background: #0a0a0a; } }
  </style>
</head>
<body id="bg">

<div class="card">
  <h1>نظام التنبيه العاجل</h1>
  <div class="subtitle">لوحة تحكم سلومي</div>
  <div class="status-box" id="status">جاهز للعمل.. ✅</div>
  <button class="btn" id="activateBtn" onclick="startSystem()">🔔 تفعيل استقبال التنبيهات</button>
  <button class="btn" id="alertBtn" onclick="triggerGlobalAlarm()">🚨 إرسال تنبيه للجميع</button>
  <audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-11.mp3" loop></audio>
</div>

<script>
  const KEYS = {
    API_KEY: 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I', 
    AUTH_TOKEN: '11696',
    VAPID: 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I'
  };

  const beep = document.getElementById('beep');
  const status = document.getElementById('status');

  if (window.location.search.includes('alarm=true')) {
    document.getElementById('bg').classList.add('alarm-active');
    status.innerHTML = "🚨 تنبيه طارئ نشط! 🚨";
    status.style.color = "#ff3b30";
    window.onclick = () => { beep.play(); };
  }

  async function startSystem() {
    try {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        const reg = await navigator.serviceWorker.register('sw.js');
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(KEYS.VAPID)
        });
        await fetch('https://api.webpushr.com/v1/subscriber/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'webpushrKey': KEYS.API_KEY, 'webpushrAuthToken': KEYS.AUTH_TOKEN },
          body: JSON.stringify(sub)
        });
        status.innerHTML = "✅ النظام متصل";
        document.getElementById('activateBtn').style.display = "none";
        document.getElementById('alertBtn').style.display = "block";
      }
    } catch (e) { alert("أضف الموقع للشاشة الرئيسية أولاً"); }
  }

  async function triggerGlobalAlarm() {
    status.innerHTML = "⏳ جاري الإرسال...";
    const response = await fetch('https://api.webpushr.com/v1/notification/send/all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'webpushrKey': KEYS.API_KEY, 'webpushrAuthToken': KEYS.AUTH_TOKEN },
      body: JSON.stringify({
        title: "🚨 تنبيه عاجل من سلومي",
        message: "حالة طوارئ، افتح التنبيه فوراً",
        target_url: window.location.href.split('?')[0] + "?alarm=true"
      })
    });
    if(response.ok) status.innerHTML = "✅ تم إرسال التنبيه";
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }
</script>
</body>
</html>
