<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 نظام إنذار سلومي</title>
    <link rel="manifest" href="manifest.json">
    
    <script>(function(w,d,s,id){if(typeof(w.webpushr)!=='undefined') return;w.webpushr=w.webpushr||function(){(w.webpushr.q=w.webpushr.q||[]).push(arguments)};var js,fjs=d.getElementsByTagName(s)[0];js=d.createElement(s);js.id=id;js.async=1;js.src='https://cdn.webpushr.com/app.min.js';fjs.parentNode.insertBefore(js,fjs);}(window,document,'script','webpushr-jssdk'));webpushr('setup',{'key':'BF2Wrik9KIE_JRdYkmlh62-nOR_KqsQVqibivdl8_l2zhVp5uNsoFlRnyIn3hy8mi7REa2yz8IUMVgMAH40w3ZI'});</script>

    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .alarm-btn { background: #ff0000; color: white; border: 4px solid #fff; padding: 25px; font-size: 24px; font-weight: bold; border-radius: 15px; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .active { animation: flash 0.3s infinite; }
        @keyframes flash { 0% { background: #ff0000; } 50% { background: #000; } 100% { background: #ff0000; } }
    </style>
</head>
<body id="bg">
    <h1>🚨 نظام الطوارئ</h1>
    <button class="alarm-btn" onclick="activate()">تفعيل واستقبال الإنذارات</button>
    
    <audio id="snd" src="https://www.soundjay.com/buttons/sounds/beep-11.mp3" loop></audio>

    <script>
        const audio = document.getElementById('snd');
        const bg = document.getElementById('bg');

        function activate() {
            // طلب الإذن يدويًا لضمان الربط
            webpushr('fetch_id', function(sid) {
                if(sid) alert("✅ تم الربط بنجاح! رقمك: " + sid);
            });
            // تشغيل وهمي للصوت عشان الآيفون يفتح السماعة
            audio.play().then(() => { audio.pause(); });
        }

        // تشغيل الإنذار فوراً إذا دخلت من الإشعار
        if(window.location.search.includes('notification=true')) {
            audio.play();
            bg.classList.add('active');
        }
    </script>
</body>
</html>
