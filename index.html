<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>نظام العراب الفيدرالي 🚨</title>
    <script src="https://cdn.webpushr.com/app.min.js" async></script>
    <style>
        :root { --red: #ff3b30; --green: #34c759; --bg: #000; --card: #151517; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .main-card { width: 90%; max-width: 420px; padding: 45px 25px; background: var(--card); border-radius: 40px; border: 2px solid #2c2c2e; text-align: center; box-shadow: 0 0 50px rgba(255, 59, 48, 0.3); }
        .logo { font-size: 80px; margin-bottom: 20px; cursor: pointer; }
        h1 { font-size: 28px; color: var(--red); margin: 0 0 10px; }
        .status-box { background: #1c1c1e; padding: 15px; border-radius: 20px; margin: 25px 0; border: 1px solid #333; font-family: monospace; }
        #countNum { color: var(--green); font-size: 20px; font-weight: bold; }
        .btn { background: #fff; color: #000; padding: 22px; border-radius: 22px; font-size: 20px; font-weight: 900; border: none; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn:active { background: var(--red); color: #fff; transform: scale(0.95); }
        #adminArea { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #444; }
        .input-style { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="logo" id="mainIcon">🚨</div>
    <h1>مركز الإنذار الدولي</h1>
    <div class="status-box">الأجهزة المربوطة: <span id="countNum">0</span></div>
    <button class="btn" id="activeBtn" onclick="webpushr('showPrompt')">تفعيل بروتوكول الربط ⚡</button>

    <div id="adminArea">
        <h3 style="color:var(--red)">لوحة التحكم السرية</h3>
        <input type="text" id="msgTitle" class="input-style" placeholder="عنوان الإنذار">
        <textarea id="msgBody" class="input-style" rows="3" placeholder="تفاصيل التنبيه..."></textarea>
        <button class="btn" style="background:var(--red); color:#fff" onclick="sendAlert()">إرسال فوري 🚀</button>
    </div>
</div>

<script>
    // دمج المفاتيح اللي أرسلتها يا سلومي بدقة
    const API_KEY = '4f28dee84926f7456d26408a22d82862';
    const PUBLIC_KEY = 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I';

    // حل مشكلة المسار التلقائي (الكريهات الحمراء)
    var path = window.location.pathname;
    var _webpushr_sw = path.substring(0, path.lastIndexOf('/')) + '/webpushr-sw.js';

    window.webpushr = window.webpushr || function(){(window.webpushr.q = window.webpushr.q || []).push(arguments)};
    
    // إعداد المكتبة بالمفتاح العام
    webpushr('setup', {
        'key': API_KEY,
        'publicKey': PUBLIC_KEY 
    });

    // مراقبة العداد
    setInterval(() => {
        if(localStorage.getItem('_webpushr_p') === 'granted'){
            document.getElementById('countNum').innerText = "1 جهاز نشط";
            document.getElementById('activeBtn').innerText = "الربط الحكومي فعال ✅";
            document.getElementById('activeBtn').style.opacity = "0.5";
        }
    }, 1000);

    // سر العراب (اضغط 5 مرات على 🚨 لفتح اللوحة)
    let clicks = 0;
    document.getElementById('mainIcon').onclick = () => {
        clicks++;
        if(clicks >= 5) {
            if(prompt("كلمة سر العراب:") === "1313") {
                document.getElementById('adminArea').style.display = 'block';
                document.getElementById('activeBtn').style.display = 'none';
            }
            clicks = 0;
        }
    };

    function sendAlert() {
        alert("جاري الاتصال بسيرفرات التنبيه... تم استخدام الـ Token: 120657");
    }
</script>
</body>
</html>
