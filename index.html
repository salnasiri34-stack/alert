<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>نظام سلومي الفيدرالي 🚨</title>
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.page.js" defer></script>
  <script>
    window.OneSignal = window.OneSignal || [];
    OneSignal.push(function() {
      OneSignal.init({
        appId: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
      });
    });

    // دالة طلب الإذن الصريحة
    function subscribeUser() {
      OneSignal.push(function() {
        OneSignal.Notifications.requestPermission();
      });
    }
  </script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .card { width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; background: #111; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
    #mainLogo { font-size: 80px; cursor: pointer; user-select: none; margin-bottom: 10px; transition: 0.3s; }
    #mainLogo:active { transform: scale(0.9); }
    h2 { margin: 10px 0; font-size: 24px; }
    .status-badge { background: #1a1a1a; padding: 10px 20px; border-radius: 50px; display: inline-block; margin-bottom: 20px; border: 1px solid #222; font-size: 14px; }
    .btn { width: 100%; padding: 20px; border-radius: 18px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; margin-top: 15px; }
    #activateBtn { background: #fff; color: #000; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
    #adminPanel { display: none; margin-top: 25px; border-top: 1px dashed #444; padding-top: 20px; }
    .admin-input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; font-size: 16px; }
    #sendBtn { background: #ff3b30; color: #fff; box-shadow: 0 5px 15px rgba(255,59,48,0.3); }
  </style>
</head>
<body>

<div class="card">
  <div id="mainLogo">🚨</div>
  <h2>مركز العمليات</h2>
  <div class="status-badge" id="statusLabel">النظام جاهز ✅</div>
  
  <button class="btn" id="activateBtn" onclick="subscribeUser()">🔔 تفعيل استقبال الإشارات</button>

  <div id="adminPanel">
    <h3 style="color: #007aff; margin-bottom: 15px;">لوحة التحكم السرية</h3>
    <input type="text" id="alertTitle" class="admin-input" placeholder="عنوان التنبيه...">
    <textarea id="alertBody" class="admin-input" rows="3" placeholder="اكتب نص الرسالة هنا..."></textarea>
    <button id="sendBtn" class="btn" onclick="sendGlobalPush()">بث الإشارة النووية 🚀</button>
  </div>
</div>

<script>
  // كود الإرسال الاحترافي لربط الموقع بالسيرفر
  async function sendGlobalPush() {
    const title = document.getElementById('alertTitle').value || "إنذار عاجل";
    const message = document.getElementById('alertBody').value || "تم تفعيل حالة الطوارئ من قبل سلومي";
    const btn = document.getElementById('sendBtn');
    
    btn.innerText = "جاري البث... 📡";
    btn.disabled = true;

    try {
      const response = await fetch("https://onesignal.com/api/v1/notifications", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          "Authorization": "Basic os_v2_app_f3iq3hzjczfddet3niv6u4de3lcuzpyuysuuxz4i56gbnugat4cakvbjm5wuc4zbmjjbibsfzxr24xqabovt57hw7gmqkbbihlondia"
        },
        body: JSON.stringify({
          app_id: "2ed10d9f-2916-4a31-927b-6a2bea7064da",
          included_segments: ["Total Subscriptions"],
          headings: {"en": title},
          contents: {"en": message},
          isIos: true
        })
      });

      if (response.ok) {
        alert("تم اختراق الأجهزة وإرسال التنبيه! 🚨🔥");
      } else {
        const error = await response.json();
        alert("فشل الإرسال: " + (error.errors ? error.errors[0] : "تأكد من المفاتيح"));
      }
    } catch (e) {
      alert("مشكلة اتصال بالخادم! جرب من 'تطبيق الشاشة الرئيسية'");
    }
    
    btn.innerText = "بث الإشارة النووية 🚀";
    btn.disabled = false;
  }

  // الدخول السري (5 ضغطات على الـ 🚨)
  let taps = 0;
  document.getElementById('mainLogo').onclick = () => {
    taps++;
    if(taps >= 5) {
      const pw = prompt("كلمة سر العرّاب:");
      if(pw === "1313") {
        document.getElementById('adminPanel').style.display = "block";
        document.getElementById('activateBtn').style.display = "none";
        document.getElementById('statusLabel').innerText = "وضع الإرسال نشط 📡";
        document.getElementById('statusLabel').style.color = "#ff3b30";
      }
      taps = 0;
    }
  };
</script>
</body>
</html>
