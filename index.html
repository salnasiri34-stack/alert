<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>نظام العرّاب سلومي 🚨</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    :root { --red: #ff3b30; --blue: #007aff; --bg: #000; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .card { width: 90%; max-width: 400px; padding: 35px; border-radius: 30px; background: #111; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    h1 { font-size: 26px; margin-bottom: 5px; }
    .subtitle { color: var(--red); font-size: 14px; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }
    
    .status-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #222; }
    #countValue { color: #34c759; font-weight: 900; font-size: 22px; }

    .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    #activateBtn { background: #fff; color: #000; }
    
    /* لوحة الأدمن السرية */
    #adminPanel { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed #444; }
    .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #000; color: #fff; border: 1px solid #333; box-sizing: border-box; }
    .alert-send-btn { background: var(--red); color: #fff; }

    .alarm-active { animation: pulse-red 0.5s infinite; }
    @keyframes pulse-red { 0% { background: #000; } 50% { background: #400; } 100% { background: #000; } }
  </style>
</head>
<body id="bg">

<div class="card">
  <div id="mainLogo" style="font-size: 70px; cursor: pointer; margin-bottom: 10px;">🚨</div>
  <h1>مركز الإنذار الدولي</h1>
  <div class="subtitle">النظام الفيدرالي للسيد سلومي</div>
  
  <div class="status-box">
    <span style="color: #aaa;">الأجهزة المربوطة بالرادار: <b id="countValue">0</b></span>
  </div>

  <button class="btn" id="activateBtn" onclick="startSystem()">🔔 تفعيل استقبال التنبيهات</button>

  <div id="adminPanel">
    <h3 style="color: var(--blue); margin-top: 0;">غرفة قيادة العرّاب</h3>
    <input type="text" id="alertTitle" class="admin-input" placeholder="عنوان الإنذار...">
    <textarea id="alertBody" class="admin-input" rows="2" placeholder="رسالة الطوارئ..."></textarea>
    <button class="btn alert-send-btn" onclick="triggerGlobalAlarm()">بث الإشارة النووية 🚀</button>
  </div>
</div>

<script>
  // مفاتيحك المعتمدة - لا نغيرها أبداً
  const KEYS = {
    API_KEY: '4f28dee84926f7456d26408a22d82862', 
    AUTH_TOKEN: '11696',
    VAPID: 'BF2WriK9KiE_JRdYkmIh62-nOR_KqsQVqibivdL8_i2zhVp5uNsoFlRNyln3hy8mi7REaZyz8lUMVgMAH40w32I'
  };

  // العداد الذكي: يقلب 1 فوراً عند السماح
  setInterval(() => {
    if (Notification.permission === 'granted') {
      document.getElementById('countValue').innerText = "1";
      document.getElementById('activateBtn').style.display = "none";
    }
  }, 1000);

  async function startSystem() {
    try {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        const reg = await navigator.serviceWorker.register('sw.js');
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(KEYS.VAPID)
        });

        await fetch('https://api.webpushr.com/v1/subscriber/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'webpushrKey': KEYS.API_KEY, 'webpushrAuthToken': KEYS.AUTH_TOKEN },
          body: JSON.stringify(sub)
        });
        alert("تم الربط بنجاح! العداد الحين صار 1 ✅");
      }
    } catch (e) { alert("أضف الموقع للشاشة الرئيسية أولاً يا بطل"); }
  }

  // كود إرسال التنبيه للكل (لوحة الأدمن)
  async function triggerGlobalAlarm() {
    const title = document.getElementById('alertTitle').value || "🚨 تنبيه من العرّاب";
    const msg = document.getElementById('alertBody').value || "حالة طوارئ قصوى!";
    
    await fetch('https://api.webpushr.com/v1/notification/send/all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'webpushrKey': KEYS.API_KEY, 'webpushrAuthToken': KEYS.AUTH_TOKEN },
      body: JSON.stringify({
        title: title,
        message: msg,
        target_url: window.location.href
      })
    });
    alert("تم بث الإشارة لجميع الأجهزة النشطة 🚀");
  }

  // سر الدخول للوحة (5 ضغطات على 🚨)
  let taps = 0;
  document.getElementById('mainLogo').onclick = () => {
    taps++;
    if(taps >= 5) {
      if(prompt("كلمة سر العرّاب:") === "1313") {
        document.getElementById('adminPanel').style.display = "block";
        document.getElementById('activateBtn').style.display = "none";
      }
      taps = 0;
    }
  };

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }
</script>
</body>
</html>
